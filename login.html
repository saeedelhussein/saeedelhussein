<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Saeed Elhussein - Cybersecurity Professional</title>
    <link rel="stylesheet" href="css/style.css">
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo">
                <span><</span>Saeed<span>/></span>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="register.html">Register</a></li>
                    <li><a href="login.html" class="active">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="container">
            <section class="section" style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
                <div class="card form-container" style="width: 100%; max-width: 450px;">
                    <h2 class="section-title" style="font-size: 2rem;">Welcome <span>Back</span></h2>
                    <p style="text-align: center; color: #b0b0b0; margin-bottom: 2rem;">Login to access your account and security resources.</p>
                    
                    <form action="#" method="post">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        </div>
                        <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                            <label style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0;">
                                <input type="checkbox" id="remember" name="remember" style="width: auto;">
                                <span style="font-size: 0.9rem;">Remember me</span>
                            </label>
                            <a href="#" style="color: #00ff88; font-size: 0.9rem;">Forgot password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
                    </form>
                    
                    <div style="margin: 2rem 0; text-align: center; position: relative;">
                        <span style="background: rgba(26, 26, 46, 0.8); padding: 0 1rem; color: #666; position: relative; z-index: 1;">or continue with</span>
                        <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(0, 255, 136, 0.2);"></div>
                    </div>
                    
                    <div style="display: flex; gap: 1rem;">
                        <button class="btn btn-secondary" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                            <span>G</span> Google
                        </button>
                        <button class="btn btn-secondary" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                            <span>GH</span> GitHub
                        </button>
                    </div>
                    
                    <p style="text-align: center; margin-top: 1.5rem; color: #b0b0b0;">
                        Don't have an account? <a href="register.html" style="color: #00ff88;">Register here</a>
                    </p>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="social-links">
                <a href="#" title="LinkedIn">in</a>
                <a href="#" title="GitHub">GH</a>
                <a href="#" title="Twitter">X</a>
            </div>
            <p class="copyright">&copy; 2024 Saeed Elhussein. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
