<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Saeed Elhussein - Cybersecurity Professional</title>
    <link rel="stylesheet" href="css/style.css">
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo">
                <span><</span>Saeed<span>/></span>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="register.html" class="active">Register</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="container">
            <section class="section" style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
                <div class="card form-container" style="width: 100%; max-width: 500px;">
                    <h2 class="section-title" style="font-size: 2rem;">Create <span>Account</span></h2>
                    <p style="text-align: center; color: #b0b0b0; margin-bottom: 2rem;">Join to access exclusive security resources and updates.</p>
                    
                    <form action="#" method="post">
                        <div class="form-group">
                            <label for="fullname">Full Name</label>
                            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" placeholder="Choose a username" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" placeholder="Create a strong password" required>
                        </div>
                        <div class="form-group">
                            <label for="confirm_password">Confirm Password</label>
                            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
                        </div>
                        <div class="form-group">
                            <label for="role">I am a...</label>
                            <select id="role" name="role">
                                <option value="">Select your role</option>
                                <option value="student">Student</option>
                                <option value="professional">Security Professional</option>
                                <option value="business">Business Owner</option>
                                <option value="enthusiast">Security Enthusiast</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" id="terms" name="terms" required style="width: auto;">
                            <label for="terms" style="margin-bottom: 0; font-size: 0.9rem;">I agree to the <a href="#" style="color: #00ff88;">Terms of Service</a> and <a href="#" style="color: #00ff88;">Privacy Policy</a></label>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
                    </form>
                    
                    <p style="text-align: center; margin-top: 1.5rem; color: #b0b0b0;">
                        Already have an account? <a href="login.html" style="color: #00ff88;">Login here</a>
                    </p>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="social-links">
                <a href="#" title="LinkedIn">in</a>
                <a href="#" title="GitHub">GH</a>
                <a href="#" title="Twitter">X</a>
            </div>
            <p class="copyright">&copy; 2024 Saeed Elhussein. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
